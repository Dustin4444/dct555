version: '3.8'\n\nservices:\n  api-gateway:\n    image: api-gateway-image\n    ports:\n      - "8080:80"\n    depends_on:\n      - microservice-a\n      - microservice-b\n\n  microservice-a:\n    image: microservice-a-image\n    build:\n      context: ./microservice-a\n    environment:\n      DATABASE_URL: "postgres://user:password@db-a:5432/mydatabase"\n    depends_on:\n      - db-a\n\n  db-a:\n    image: postgres:latest\n    environment:\n      POSTGRES_DB: mydatabase\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n\n  microservice-b:\n    image: microservice-b-image\n    build:\n      context: ./microservice-b\n    environment:\n      DATABASE_URL: "postgres://user:password@db-b:5432/mydatabase"\n    depends_on:\n      - db-b\n\n  db-b:\n    image: postgres:latest\n    environment:\n      POSTGRES_DB: mydatabase\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password